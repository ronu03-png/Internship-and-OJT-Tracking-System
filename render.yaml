# Render Blueprint for the OJT InternTrack backend API.
# Deploy: push this repo to GitHub, then in Render choose "New > Blueprint"
# and point it at this repository. Render reads this file automatically.
#
# NOTE on the persistent disk below: disks require a paid instance type
# (e.g. "starter"). On the free plan the filesystem is ephemeral, so the
# SQLite database resets on every deploy/restart. For a free demo, remove the
# `disk` block and the DATABASE_PATH env var, then re-run the seed when needed.

services:
  - type: web
    name: interntrack-api
    runtime: node
    plan: starter            # change to "free" if you don't need a persistent disk
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random secret
      - key: DATABASE_PATH
        value: /var/data/data.sqlite
      - key: CLIENT_ORIGIN
        sync: false           # set this to your Netlify URL after deploying the frontend
    disk:
      name: interntrack-data
      mountPath: /var/data
      sizeGB: 1
